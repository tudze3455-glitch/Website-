<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 PrivateChat - 2 Person WhatsApp</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { heightg: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); overflow: hidden; }
        
        .app { height: 100vh; display: flex; flex-direction: column; background: #fff; }
        
        /* Header */
        .header { 
            height: 70px; background: #075e54; color: white; display: flex; 
            align-items: center; padding: 0 20px; position: sticky; top: 0; z-index: 10;
        }
        .header-left { flex: 1; }
        .partner-name { font-weight: 600; font-size: 16px; }
        .status { font-size: 13px; opacity: 0.9; margin-top: 2px; }
        .online { color: #4fc3f7 !important; }
        .offline { color: #ff9800 !important; }
        .header-right { display: flex; gap: 10px; }
        .btn { background: rgba(255,255,255,0.2); color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; transition: all 0.3s; }
        .btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }
        
        /* Messages */
        .messages { flex: 1; padding: 20px; overflow-y: auto; background: #efeae2; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 70%; padding: 12px 16px; border-radius: 18px; word-wrap: break-word; position: relative; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .message.sent { align-self: flex-end; background: #dcf8c6; color: #000; margin-left: auto; }
        .message.received { align-self: flex-start; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .message-time { font-size: 11px; opacity: 0.7; margin-top: 4px; text-align: right; }
        .message-status { font-size: 11px; margin-left: 4px; }
        .delivered::after { content: "✓✓"; color: #53bdeb; }
        .seen::after { content: "✓✓"; color: #4fc3f7; font-weight: bold; }
        
        .typing-indicator { 
            align-self: flex-start; background: #e1f5fe; padding: 12px 16px; 
            border-radius: 18px; font-style: italic; color: #0277bd; font-size: 14px;
            border-bottom-left-radius: 4px; display: flex; align-items: center; gap: 8px;
        }
        .typing-dots { display: flex; gap: 2px; }
        .typing-dots span { width: 6px; height: 6px; background: #0277bd; border-radius: 50%; animation: typing 1.4s infinite; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-10px); } }
        
        /* Input */
        .input-area { 
            padding: 16px 20px; background: #f0f0f0; display: flex; gap: 12px; align-items: flex-end; 
            border-top: 1px solid #ddd;
        }
        .message-input { 
            flex: 1; padding: 12px 20px; border: 1px solid #ddd; border-radius: 25px; 
            font-size: 15px; resize: none; max-height: 120px; outline: none; line-height: 1.4;
        }
        .message-input:focus { border-color: #075e54; box-shadow: 0 0 0 2px rgba(7,94,84,0.2); }
        .send-btn { 
            width: 48px; height: 48px; background: #075e54; color: white; border: none; 
            border-radius: 50%; cursor: pointer; font-size: 18px; transition: all 0.3s;
        }
        .send-btn:hover:not(:disabled) { background: #128c7e; transform: scale(1.1); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Responsive */
        @media (max-width: 768px) { 
            .message { max-width: 85%; } 
            .header { padding: 0 16px; }
            .input-area { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <div class="header">
            <div class="header-left">
                <div class="partner-name" id="partnerName">Waiting for partner...</div>
                <div class="status offline" id="status">Connecting...</div>
            </div>
            <div class="header-right">
                <button class="btn" id="clearBtn">🗑️ Clear</button>
                <button class="btn" id="shareBtn">🔗 Share</button>
            </div>
        </div>
        
        <div class="messages" id="messages"></div>
        
        <div class="input-area">
            <textarea class="message-input" id="messageInput" placeholder="Type a message..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn" disabled>➤</button>
        </div>
    </div>

    <script>
        // === STATE ===
        let ws = null;
        let messages = [];
        let partnerName = 'Partner';
        let isTyping = false;
        let typingTimer;
        let myName = prompt('Enter your name:') || 'You';
        const roomId = 'room-' + Math.random().toString(36).substr(2, 8);

        // === DOM ===
        const app = document.getElementById('app');
        const messagesEl = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const partnerNameEl = document.getElementById('partnerName');
        const statusEl = document.getElementById('status');
        const clearBtn = document.getElementById('clearBtn');
        const shareBtn = document.getElementById('shareBtn');

        // === WEBSOCKET ===
        function connect() {
            ws = new WebSocket(`ws://${window.location.host}/?room=${roomId}`);

            ws.onopen = () => {
                console.log('✅ Connected!');
                statusEl.textContent = 'Online';
                statusEl.classList.add('online');
                statusEl.classList.remove('offline');
                send({ type: 'join', name: myName });
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };

            ws.onclose = () => {
                statusEl.textContent = 'Reconnecting...';
                statusEl.classList.remove('online');
                statusEl.classList.add('offline');
                setTimeout(connect, 1000);
            };
        }

        function send(data) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(data));
            }
        }

        // === MESSAGE HANDLER ===
        function handleMessage(data) {
            switch (data.type) {
                case 'roomInfo':
                    console.log(`📱 Room: ${data.roomId}`);
                    break;

                case 'userJoined':
                    if (data.users.length === 2) {
                        partnerName = data.users.find(name => name !== myName) || 'Partner';
                        partnerNameEl.textContent = partnerName;
                        statusEl.textContent = `${partnerName} is online`;
                    }
                    break;

                case 'userLeft':
                    partnerNameEl.textContent = 'Partner left';
                    statusEl.textContent = 'Offline';
                    break;

                case 'message':
                    messages.push(data);
                    if (document.visibilityState === 'visible') {
                        data.status = 'seen';
                    }
                    renderMessages();
                    playNotification();
                    break;

                case 'typing':
                    isTyping = data.isTyping;
                    renderTyping();
                    break;

                case 'clear':
                    messages = [];
                    renderMessages();
                    break;

                case 'chatHistory':
                    messages = data.messages || [];
                    renderMessages();
                    break;

                case 'error':
                    alert(data.message);
                    break;
            }
        }

        // === RENDER ===
        function renderMessages() {
            messagesEl.innerHTML = '';
            messages.slice(-50).forEach(msg => {
                const isSent = msg.sender === myName;
                const msgEl = document.createElement('div');
                msgEl.className = `message ${isSent ? 'sent' : 'received'}`;
                msgEl.innerHTML = `
                    <div>${escapeHtml(msg.text)}</div>
                    <div class="message-time">${formatTime(msg.time)} 
                        ${isSent ? `<span class="message-status ${msg.status || 'delivered'}"></span>` : ''}
                    </div>
                `;
                messagesEl.appendChild(msgEl);
            });
            messagesEl.scrollTop = messagesEl.scrollHeight;
            renderTyping();
        }

        function renderTyping() {
            const typingEl = document.querySelector('.typing-indicator');
            if (isTyping && partnerName !== myName) {
                if (!typingEl) {
                    const el = document.createElement('div');
                    el.className = 'typing-indicator';
                    el.innerHTML = `
                        <div>${partnerName} is typing</div>
                        <div class="typing-dots">
                            <span></span><span></span><span></span>
                        </div>
                    `;
                    messagesEl.appendChild(el);
                }
                messagesEl.scrollTop = messagesEl.scrollHeight;
            } else if (typingEl) {
                typingEl.remove();
            }
        }

        function formatTime(isoString) {
            return new Date(isoString).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // === EVENTS ===
        messageInput.addEventListener('input', () => {
            send({ type: 'typing', isTyping: true });
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => send({ type: 'typing', isTyping: false }), 1500);
            
            sendBtn.disabled = !messageInput.value.trim();
            autoResize();
        });

        sendBtn.addEventListener('click', sendMessage);

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        clearBtn.addEventListener('click', () => {
            if (confirm('Clear all messages?')) {
                send({ type: 'clear' });
            }
        });

        shareBtn.addEventListener('click', () => {
            const url = `${window.location.href}?room=${roomId}`;
            navigator.clipboard.writeText(url).then(() => {
                alert('Link copied! Share with your partner.');
            });
        });

        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            send({ 
                type: 'message', 
                text: text 
            });

            messageInput.value = '';
            sendBtn.disabled = true;
            autoResize();
        }

        function autoResize() {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
        }

        function playNotification() {
            // Browser notification
            if (Notification.permission === 'granted') {
                new Notification(partnerName, { 
                    body: 'New message!', 
                    icon: '📱',
                    badge: '💬'
                });
            }

            // Sound
            const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1
